<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/styles.css">
     <script src="scripts/signup.js" defer></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-dark">
            <div class="container">
                <a class="navbar-brand text-white" href="#"> Skill Nest </a>
                <input type="checkbox" id="menu toggle" hidden>
                <label for="menu toggle" class="d-md-none fs-2 text-white">
                    <i class="bi bi-list"></i>
                </label>
                <ul class="navbar-nav ms-auto mobile-menu d-none d-md-flex">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="main.html">Roadmap</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="main.html">Courses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="signup.html">Sign Up</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="about.html">FAQ</a>
                    </li>
                </ul>
            </div>
        </nav>
        <section id="signup">
            <div class="container py-5">
                <h2 class="fw-bold mb-4">Sign Up</h2>
                <div class="row g-4">
                    <div class="col-12 col-md-6">
                        <form id="signupForm">
                            <fieldset>
                                <legend>Registration</legend>
                                <label for="name" class="form-label">Name</label>
                                <input type="text" id="name" class="form-control" placeholder="Enter Your Name">
                                <label for="age" class="form-label mt-3">Age</label>
                                <input type="text" id="age" class="form-control" placeholder="Enter Your Age">
                                <label for="gender" class="form-label mt-3">Gender</label>
                                <select id="gender" class="form-select">
                                    <option selected disabled>Select Gender</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                </select>
                                <div class="container mt-3">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check2"></i> Register
                                    </button>
                                    <div id="successMessage" class="success-message">
                                        <strong>Registration successful!</strong><br>
                                        Welcome to Skill Nest.<br>
                                        Redirecting to courses...
                                    </div>
                                </div>
                            </fieldset>
                        </form>
                    </div>
                </div>
            </div>
        </section>
</body>
